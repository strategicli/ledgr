# Weekly health check (slice 37, PRD §6.2). The scheduled self-monitor: once a
# week it reads the same canaries /health exposes and pushes Brandon only when
# something genuinely needs attention (DB down, captured errors, a stalled cron,
# an expiring Graph secret). Weekly is sub-daily-frequency, so it runs from
# GitHub Actions hitting the authenticated endpoint — the scheduler seam the
# PRD chose (§6.1), the same door calendar/email/Todoist/prep use, swappable for
# a local cron in Phase 4.
#
# Monday 13:00 UTC (~8–9am ET) — start of the week, when seeing a stalled job
# is most useful. Auth: the same LEDGR_CRON_TOKEN repo secret (a cron-scoped
# Ledgr machine token). A non-200 fails the run loudly (GitHub emails the
# owner), which is itself a second, transport-level health signal.
name: health-check

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Run weekly health check
        env:
          LEDGR_CRON_TOKEN: ${{ secrets.LEDGR_CRON_TOKEN }}
          APP_URL: ${{ vars.LEDGR_APP_URL || 'https://ledgr-teal.vercel.app' }}
        run: |
          test -n "$LEDGR_CRON_TOKEN" || { echo "::error::LEDGR_CRON_TOKEN secret is not set (cron-scope machine token, runbook §3)"; exit 1; }
          HTTP=$(curl -sS -o response.json -w "%{http_code}" -X GET \
            "$APP_URL/api/machine/health-check" \
            -H "Authorization: Bearer $LEDGR_CRON_TOKEN")
          echo "HTTP $HTTP"; cat response.json; echo
          [ "$HTTP" = "200" ] || { echo "::error::health-check returned $HTTP"; exit 1; }

      - name: Report failure to Ledgr (when token exists)
        if: failure()
        env:
          LEDGR_ERROR_TOKEN: ${{ secrets.LEDGR_ERROR_TOKEN }}
          APP_URL: ${{ vars.LEDGR_APP_URL || 'https://ledgr-teal.vercel.app' }}
        run: |
          [ -n "$LEDGR_ERROR_TOKEN" ] || exit 0
          curl -fsS -X POST "$APP_URL/api/machine/report-error" \
            -H "Authorization: Bearer $LEDGR_ERROR_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source\":\"health-check\",\"message\":\"weekly health-check workflow failed\",\"detail\":{\"runUrl\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}}" || true
