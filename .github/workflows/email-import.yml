# Email-in import (slice 26, PRD §5.3). Polls the "Ledgr Import" Outlook
# folder via Graph messages/delta on the GitHub Actions scheduler — same door
# and cron token as the other syncs.
#
# Cadence: twice daily on weekdays (was every 30 min). The 30-min poll was the
# single largest driver of Neon compute — each run wakes the DB and holds it for
# the fixed 5-min autosuspend tail, so 48 runs/day ≈ half the compute bill,
# mostly to check a mailbox that usually had nothing new. Twice a day on Mon–Fri
# covers a personal inbox's real needs; when you know something specific needs
# pulling in NOW, use a manual trigger instead of paying for a tight poll:
#   • this workflow → "Run workflow" (workflow_dispatch, below), or
#   • the in-app user-authed twin: POST /api/email/import.
# Times are UTC, Mon–Fri only (in winter these land ~1h earlier in Central).
# 13:00 = ~8am Central, start of the workday; 22:00 = ~5pm Central, end of it.
# Both windows are shared with calendar-sync, so the two ride one compute wake.
#
# Auth: LEDGR_CRON_TOKEN repo secret (cron-scope machine token, runbook §3).
name: email-import

on:
  schedule:
    - cron: "0 13 * * 1-5"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger email import
        env:
          LEDGR_CRON_TOKEN: ${{ secrets.LEDGR_CRON_TOKEN }}
          APP_URL: ${{ vars.LEDGR_APP_URL || 'https://ledgr-teal.vercel.app' }}
        run: |
          test -n "$LEDGR_CRON_TOKEN" || { echo "::error::LEDGR_CRON_TOKEN secret is not set (cron-scope machine token, runbook §3)"; exit 1; }
          HTTP=$(curl -sS -o response.json -w "%{http_code}" -X GET \
            "$APP_URL/api/machine/email-import" \
            -H "Authorization: Bearer $LEDGR_CRON_TOKEN")
          echo "HTTP $HTTP"; cat response.json; echo
          # 503 = Mail.ReadWrite / the Outlook folder not set up yet (§1c/§5.3):
          # expected before setup, so don't fail the run. Any other non-200 does.
          [ "$HTTP" = "200" ] || [ "$HTTP" = "503" ] || { echo "::error::email-import returned $HTTP"; exit 1; }

      - name: Report failure to Ledgr (when token exists)
        if: failure()
        env:
          LEDGR_ERROR_TOKEN: ${{ secrets.LEDGR_ERROR_TOKEN }}
          APP_URL: ${{ vars.LEDGR_APP_URL || 'https://ledgr-teal.vercel.app' }}
        run: |
          [ -n "$LEDGR_ERROR_TOKEN" ] || exit 0
          curl -fsS -X POST "$APP_URL/api/machine/report-error" \
            -H "Authorization: Bearer $LEDGR_ERROR_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source\":\"email-import\",\"message\":\"email import workflow failed\",\"detail\":{\"runUrl\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}}" || true
